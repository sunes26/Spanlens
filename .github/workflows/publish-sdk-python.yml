name: Publish spanlens (Python)

# Triggers:
#   • manual via workflow_dispatch (smoke check + publish)
#   • push a git tag like `python-sdk-v0.1.1` → automated publish
#
# Requires repository secret PYPI_API_TOKEN — a *project-scoped* PyPI token
# for the `spanlens` project (account-wide tokens work too but are over-privileged).
#
# Long-term migration path: PyPI Trusted Publishing (OIDC, no static token).
# Requires a one-time configuration at https://pypi.org/manage/project/spanlens/settings/publishing/
# pointing at this workflow file. Once enabled, drop PYPI_API_TOKEN and replace
# the upload step's `password` with the OIDC flow.

on:
  push:
    tags:
      - 'python-sdk-v*'
  workflow_dispatch:

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    # Optional GitHub "Environment" — gates publish on a manual review if you
    # ever want a human in the loop. Safe to leave commented for now.
    # environment: pypi
    permissions:
      contents: read
      id-token: write   # required IF you migrate to Trusted Publishing later
    defaults:
      run:
        working-directory: packages/sdk-python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          # No cache — only one install in the entire job, caching adds latency.

      - name: Install build + test deps
        run: |
          python -m pip install --upgrade pip
          # Editable install pulls in our runtime deps + the [dev] extras
          # (pytest, respx). build + twine come from PyPI directly.
          python -m pip install -e ".[dev]"
          python -m pip install build twine

      - name: Lint
        run: python -m ruff check spanlens tests

      - name: Test
        run: python -m pytest -v

      - name: Build sdist + wheel
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Verify built artefacts
        run: python -m twine check dist/*

      # Sanity guard — a stale tag could ship a version that's already on PyPI.
      # Fail fast with a clear message instead of getting a 400 from twine.
      - name: Refuse to publish if version already on PyPI
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if curl -fsSL "https://pypi.org/pypi/spanlens/${VERSION}/json" >/dev/null 2>&1; then
            echo "::error::spanlens ${VERSION} is already on PyPI. Bump the version in pyproject.toml."
            exit 1
          fi
          echo "Will publish spanlens ${VERSION}"

      - name: Upload to PyPI
        env:
          # Modern twine (5+) accepts the token directly via TWINE_PASSWORD
          # with TWINE_USERNAME=__token__. No interactive prompt.
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::error::PYPI_API_TOKEN secret is empty or not forwarded to this job."
            exit 1
          fi
          # --non-interactive forces twine to fail loudly if env vars are missing
          # instead of hanging on a stdin prompt.
          python -m twine upload --non-interactive dist/*
