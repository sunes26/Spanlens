name: Keep-alive ping (every 10 min)

# Node.js runtime on Vercel goes cold after ~10-30 min of inactivity.
# This workflow pings /health every 10 minutes to keep the function warm,
# preventing cold-start latency spikes for users.

on:
  schedule:
    - cron: '*/10 * * * *' # every 10 minutes (UTC)
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          curl --fail --silent --show-error \
            https://spanlens-server.vercel.app/health
