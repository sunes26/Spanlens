name: Evaluate alerts (every 15 min)

# 예산·에러율·지연 임계치를 주기적으로 평가해서 Resend/Slack/Discord로 전송.

on:
  schedule:
    - cron: '*/15 * * * *' # 매 15분
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/evaluate-alerts
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://spanlens-server.vercel.app/cron/evaluate-alerts
