name: Publish @spanlens/sdk

# Triggers:
#   • manual via workflow_dispatch (version bump + publish)
#   • push a git tag like `sdk-v0.1.0` → automated publish
#
# Requires repository secret NPM_TOKEN with 'Automation' token scope.

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      # NOTE: intentionally NOT using setup-node's registry-url — it sets
      # NPM_CONFIG_USERCONFIG to point at its own .npmrc, which shadowed the
      # package-level .npmrc we tried to write. Manage auth ourselves.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test SDK
        run: pnpm --filter @spanlens/sdk test

      - name: Build SDK
        run: pnpm --filter @spanlens/sdk build

      - name: Publish to npm
        working-directory: packages/sdk
        run: |
          # Debug: confirm token is injected (length only, never the value)
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not forwarded"
            exit 1
          fi
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"

          # Write .npmrc with literal token (no variable reference) so nothing
          # can strip/re-expand it at publish time.
          printf '//registry.npmjs.org/:_authToken=%s\n' "$NPM_TOKEN" > .npmrc
          echo "--- .npmrc preview (token masked) ---"
          sed 's/_authToken=.*/_authToken=***REDACTED***/' .npmrc

          # Explicit userconfig pointer + unset setup-node's shadow config
          unset NPM_CONFIG_USERCONFIG
          npm publish --provenance --access public --userconfig "$PWD/.npmrc"
          rm -f .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
