name: Publish @spanlens/sdk

# Triggers:
#   • manual via workflow_dispatch (version bump + publish)
#   • push a git tag like `sdk-v0.1.0` → automated publish
#
# Requires repository secret NPM_TOKEN with 'Automation' token scope.

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test SDK
        run: pnpm --filter @spanlens/sdk test

      - name: Build SDK
        run: pnpm --filter @spanlens/sdk build

      # Write .npmrc directly into the package dir so npm publish finds it.
      # setup-node's approach (env-var expansion in ~/.npmrc) doesn't always
      # work alongside pnpm workspaces.
      - name: Publish to npm
        working-directory: packages/sdk
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --provenance --access public
          rm .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
