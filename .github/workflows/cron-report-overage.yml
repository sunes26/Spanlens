name: Report Paddle usage overage (daily)

on:
  schedule:
    - cron: '30 3 * * *' # UTC 03:30 (30 min after prune-logs)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/report-usage-overage
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://spanlens-server.vercel.app/cron/report-usage-overage
