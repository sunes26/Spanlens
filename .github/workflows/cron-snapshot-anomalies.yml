name: Snapshot anomalies (daily)

# Persists each day's anomaly detection into anomaly_events so the
# dashboard can show history. Idempotent per (org, day, provider, model,
# kind) via UPSERT — safe to re-run.

on:
  schedule:
    - cron: '0 4 * * *' # UTC 04:00 (after aggregate-usage at 04:00 — same hour batch)
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call /cron/snapshot-anomalies
        run: |
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://spanlens-server.vercel.app/cron/snapshot-anomalies
